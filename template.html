<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>{{REPORT_TITLE}}</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--ink:#0F0F0D;--paper:#F6F4EF;--card:#FFFFFF;--border:#E4E1D8;--red:#C0392B;--red-bg:#FDF0EE;--amber:#C27B0A;--amber-bg:#FEF8ED;--green:#1A6B4A;--green-bg:#EEF7F2;--blue:#1A4F8A;--blue-bg:#EEF3FB;--purple:#5B2D8E;--purple-bg:#F4EEF9;--gray:#777;--gray-bg:#F1EFE9;--hold:#888;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--paper);color:var(--ink);font-size:13px;line-height:1.5;}
.topbar{background:var(--ink);color:#F6F4EF;padding:14px 28px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:200;}
.topbar h1{font-family:'Syne',sans-serif;font-size:15px;font-weight:800;letter-spacing:-.02em;}
.topbar p{font-size:10px;color:#888;margin-top:1px;}
.stats{display:flex;gap:20px;align-items:center;}
.sm span{display:block;font-family:'Syne',sans-serif;font-size:18px;font-weight:700;text-align:center;}
.sm small{font-size:9px;color:#888;letter-spacing:.06em;text-transform:uppercase;display:block;text-align:center;}
.hbadge{padding:4px 12px;border-radius:20px;font-size:11px;font-weight:700;letter-spacing:.5px;}
.health-green{background:#052e16;color:#4ade80;}
.health-yellow{background:#422006;color:#fbbf24;}
.health-red{background:#450a0a;color:#f87171;}
.pbtn{padding:5px 12px;border:1px solid #333;border-radius:4px;background:transparent;color:#F6F4EF;font-size:11px;cursor:pointer;}

/* ── Next 48 Hours calendar ─────────────────────────────────── */
.cal-wrap{max-width:1400px;margin:18px auto 0;padding:0 28px;}
.cal-head{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
.cal-title{font-family:'Syne',sans-serif;font-size:15px;font-weight:800;}
.cal-sub{font-size:11px;color:var(--gray);}
.cal-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;}
.cal-col{background:var(--card);border:1px solid var(--border);border-radius:9px;overflow:hidden;display:flex;flex-direction:column;}
.cal-col-head{padding:8px 12px;font-size:11px;font-weight:700;letter-spacing:.04em;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);}
.cal-overdue .cal-col-head{background:var(--red-bg);color:var(--red);}
.cal-today .cal-col-head{background:var(--amber-bg);color:var(--amber);}
.cal-tomorrow .cal-col-head{background:var(--blue-bg);color:var(--blue);}
.cal-soon .cal-col-head{background:var(--purple-bg);color:var(--purple);}
.cal-count{background:rgba(0,0,0,.08);border-radius:10px;padding:0 7px;font-size:11px;font-weight:700;}
.cal-body{padding:6px;display:flex;flex-direction:column;gap:5px;min-height:46px;max-height:230px;overflow-y:auto;}
.cal-item{text-align:left;border:1px solid var(--border);border-radius:6px;padding:6px 8px;background:var(--paper);cursor:pointer;font-family:'DM Sans',sans-serif;width:100%;display:block;}
.cal-item:hover{border-color:var(--ink);}
.cal-item b{font-size:11.5px;font-weight:600;display:block;line-height:1.25;}
.cal-item .ci-meta{font-size:10px;color:var(--gray);margin-top:2px;display:flex;gap:6px;flex-wrap:wrap;}
.cal-item .ci-days{color:var(--red);font-weight:600;}
.cal-empty{font-size:11px;color:#bbb;font-style:italic;padding:10px;text-align:center;}

.filterbar{background:var(--card);border-bottom:1px solid var(--border);padding:9px 28px;display:flex;gap:7px;flex-wrap:wrap;align-items:center;position:sticky;top:52px;z-index:100;margin-top:18px;}
.srch{padding:5px 12px;border-radius:20px;border:1px solid var(--border);font-size:12px;width:200px;outline:none;background:var(--paper);}
.srch:focus{border-color:var(--ink);}
.fbtn{padding:4px 11px;border-radius:20px;border:1px solid var(--border);background:var(--paper);font-size:11px;cursor:pointer;white-space:nowrap;}
.fbtn:hover,.fbtn.on{background:var(--ink);color:#F6F4EF;border-color:var(--ink);}
.showing{margin-left:auto;font-size:11px;color:var(--gray);font-weight:500;}
.wrap{max-width:1400px;margin:0 auto;padding:20px 28px;}
.brand-section{margin-bottom:28px;}
.bh{display:flex;align-items:center;gap:8px;margin-bottom:10px;padding-bottom:6px;border-bottom:2px solid var(--ink);}
.bn{font-family:'Syne',sans-serif;font-size:16px;font-weight:800;}
.bc{font-size:10px;background:var(--ink);color:#F6F4EF;padding:1px 7px;border-radius:10px;}
.bpm{font-size:11px;color:var(--gray);margin-left:auto;}
.task{background:var(--card);border:1px solid var(--border);border-radius:7px;margin-bottom:7px;overflow:hidden;border-left:4px solid var(--border);scroll-margin-top:120px;}
.task.flash{animation:flash 1.4s ease;}
@keyframes flash{0%{box-shadow:0 0 0 3px rgba(192,57,43,.55);}100%{box-shadow:0 0 0 0 rgba(192,57,43,0);}}
.task.escalation{border-left-color:#C0392B;}
.task.needs-action{border-left-color:#C27B0A;}
.task.ready{border-left-color:#1A6B4A;}
.task.in-progress{border-left-color:#1A4F8A;}
.task.on-hold{border-left-color:#888;}
.task-head{display:grid;grid-template-columns:26% 22% 12% 16% 12% 12%;align-items:stretch;}
.tc{padding:9px 11px;border-right:1px solid var(--border);}
.tc:last-child{border-right:none;}
.tc-label{font-size:9px;text-transform:uppercase;letter-spacing:.07em;color:var(--gray);font-weight:500;margin-bottom:3px;}
.task-num{display:inline-block;background:var(--ink);color:#F6F4EF;font-family:'DM Mono',monospace;font-size:10px;font-weight:600;padding:1px 6px;border-radius:10px;margin-right:6px;vertical-align:middle;}
.task-name{font-weight:500;font-size:13px;line-height:1.3;display:inline;}
.task-del{font-size:11px;color:var(--gray);margin-top:1px;}
.tag{display:inline-block;font-size:10px;padding:2px 6px;border-radius:3px;font-weight:500;margin:1px 2px 1px 0;white-space:nowrap;}
.t-esc{background:#FDF0EE;color:#C0392B;}
.t-amber{background:#FEF8ED;color:#C27B0A;}
.t-blue{background:#EEF3FB;color:#1A4F8A;}
.t-green{background:#EEF7F2;color:#1A6B4A;}
.t-purple{background:#F4EEF9;color:#5B2D8E;}
.t-gray{background:#F5F3EE;color:#888;}
.date-over{color:#C0392B;font-weight:600;}
.date-soon{color:#C27B0A;font-weight:600;}
.date-ok{color:#777;}
.date-none{color:#bbb;font-style:italic;font-size:11px;}
.cu-link{display:inline-flex;align-items:center;gap:3px;font-size:11px;color:#555;text-decoration:none;padding:2px 7px;border:1px solid var(--border);border-radius:4px;background:var(--paper);}
.cu-link:hover{border-color:var(--ink);color:var(--ink);}
.task-body{border-top:1px solid var(--border);display:grid;grid-template-columns:1fr 1fr 1fr 1fr;}
.tb{padding:9px 11px;border-right:1px solid var(--border);}
.tb:last-child{border-right:none;}
.tb-label{font-size:9px;text-transform:uppercase;letter-spacing:.07em;color:var(--gray);font-weight:500;margin-bottom:5px;}
.tb-text{font-size:12px;color:var(--ink);line-height:1.55;white-space:pre-wrap;}
.reply-box{background:#EEF3FB;border:1px solid #C5D8F0;border-radius:5px;padding:6px 9px;font-size:11px;color:#1A4F8A;line-height:1.5;margin-top:2px;}
.reply-box::before{content:'SUGGESTED REPLY \2192';display:block;font-size:9px;color:#1A4F8A;letter-spacing:.07em;margin-bottom:4px;font-weight:600;}
.followup-box{background:#FEF8ED;border:1px solid #F0D99A;border-radius:5px;padding:6px 9px;font-size:11px;color:#8A5C00;line-height:1.5;margin-top:6px;}
.followup-box::before{content:'FOLLOW-UP \2014 48H NO CLIENT REPLY \2192';display:block;font-size:9px;color:#C27B0A;letter-spacing:.06em;margin-bottom:4px;font-weight:600;}
.pm-box{background:#FEF8ED;border:1px solid #F0D99A;border-radius:5px;padding:6px 9px;font-size:11px;color:#8A5C00;line-height:1.55;}
.pm-box::before{content:'PM ACTION \2192';display:block;font-size:9px;color:#C27B0A;letter-spacing:.07em;margin-bottom:4px;font-weight:600;}
.int-dir{margin-top:6px;font-size:11px;color:#555;border-top:1px solid var(--border);padding-top:5px;line-height:1.5;}
.post-btn{margin-top:6px;padding:5px 12px;border-radius:4px;border:none;background:var(--ink);color:#F6F4EF;font-size:11px;cursor:pointer;font-family:'DM Sans',sans-serif;display:block;}
.post-btn:hover{background:#333;}
.empty-state{text-align:center;padding:60px;color:#999;font-size:14px;}
.footer{text-align:center;padding:20px;font-size:11px;color:#bbb;border-top:1px solid var(--border);margin-top:20px;}
.hidden{display:none!important;}
@media print{.topbar{position:static;}.filterbar{display:none;}.cal-body{max-height:none;}}
</style>
</head>
<body>

<div class="topbar">
  <div>
    <h1>{{REPORT_TITLE}}</h1>
    <p>Generated {{GENERATED_AT}}</p>
  </div>
  <div class="stats">
    <div class="sm"><span id="sEsc" style="color:#C0392B">0</span><small>Escalations</small></div>
    <div class="sm"><span id="sFup" style="color:#C27B0A">0</span><small>Follow-ups</small></div>
    <div class="sm"><span id="s48" style="color:#1A4F8A">0</span><small>Next 48h</small></div>
    <div class="sm"><span id="sWin" style="color:#1A6B4A">0</span><small>Wins</small></div>
    <div class="sm"><span id="sTot">0</span><small>Total</small></div>
    <span class="hbadge {{HEALTH_CLASS}}">{{HEALTH_ICON}} {{HEALTH_LABEL}}</span>
    <button class="pbtn" onclick="window.print()">Export PDF</button>
  </div>
</div>

<!-- ── Next 48 Hours calendar ─────────────────────────────────── -->
<div class="cal-wrap">
  <div class="cal-head">
    <span class="cal-title">📅 Next 48 Hours</span>
    <span class="cal-sub">What needs to land today &amp; the next two days — click any item to jump to the task.</span>
  </div>
  <div class="cal-grid">
    <div class="cal-col cal-overdue"><div class="cal-col-head"><span>⚠️ Overdue</span><span class="cal-count" id="calc-overdue">0</span></div><div class="cal-body" id="cal-overdue"></div></div>
    <div class="cal-col cal-today"><div class="cal-col-head"><span>🔴 Today</span><span class="cal-count" id="calc-today">0</span></div><div class="cal-body" id="cal-today"></div></div>
    <div class="cal-col cal-tomorrow"><div class="cal-col-head"><span>🟡 Tomorrow</span><span class="cal-count" id="calc-tomorrow">0</span></div><div class="cal-body" id="cal-tomorrow"></div></div>
    <div class="cal-col cal-soon"><div class="cal-col-head"><span>🔵 Day After</span><span class="cal-count" id="calc-soon">0</span></div><div class="cal-body" id="cal-soon"></div></div>
  </div>
</div>

<div class="filterbar">
  <input type="text" class="srch" id="srch" placeholder="Search brand or deliverable..." oninput="doSearch()">
  <button class="fbtn on" data-flag="ALL" onclick="doFilter('ALL',this)">All</button>
  <button class="fbtn" data-flag="ESCALATION" onclick="doFilter('ESCALATION',this)">🚨 Escalations</button>
  <button class="fbtn" data-flag="FOLLOWUP_DUE" onclick="doFilter('FOLLOWUP_DUE',this)">🔁 Follow-up</button>
  <button class="fbtn" data-flag="CLIENT_REPLIED" onclick="doFilter('CLIENT_REPLIED',this)">💬 Client Replied</button>
  <button class="fbtn" data-flag="CLIENT_WAITING" onclick="doFilter('CLIENT_WAITING',this)">🔴 Client Waiting</button>
  <button class="fbtn" data-flag="SLA_BREACH" onclick="doFilter('SLA_BREACH',this)">⏱ SLA Breach</button>
  <button class="fbtn" data-flag="OVERDUE" onclick="doFilter('OVERDUE',this)">⚠️ Overdue</button>
  <button class="fbtn" data-flag="BLOCKED" onclick="doFilter('BLOCKED',this)">🚧 Blocked</button>
  <button class="fbtn" data-flag="URGENT" onclick="doFilter('URGENT',this)">🔥 Urgent</button>
  <button class="fbtn" data-flag="SEND_NOW" onclick="doFilter('SEND_NOW',this)">📤 Send Now</button>
  <button class="fbtn" data-flag="NEEDS_PM_REVIEW" onclick="doFilter('NEEDS_PM_REVIEW',this)">👁 Review</button>
  <button class="fbtn" data-flag="WIN" onclick="doFilter('WIN',this)">🏆 Wins</button>
  <span class="showing" id="showing">0 tasks</span>
</div>

<div class="wrap" id="wrap"></div>
<div class="footer">{{FOOTER_TEXT}}</div>

<script>
var D = {{REPORT_DATA_JSON}};

function x(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function dueVal(t){return t.due_date||t.due||'';}
function actionVal(t){return t.action||t.pm_action||'';}

function taskClass(flags){
  if(!flags||!flags.length) return 'on-hold';
  if(flags.indexOf('ESCALATION')>-1||flags.indexOf('CLIENT_WAITING')>-1||flags.indexOf('SLA_BREACH')>-1||flags.indexOf('SEND_NOW')>-1) return 'escalation';
  if(flags.indexOf('CLIENT_REPLIED')>-1) return 'ready';
  if(flags.indexOf('FOLLOWUP_DUE')>-1||flags.indexOf('OVERDUE_TODAY')>-1||flags.indexOf('OVERDUE')>-1||flags.indexOf('INCOMPLETE')>-1||flags.indexOf('BLOCKED')>-1||flags.indexOf('URGENT')>-1) return 'needs-action';
  if(flags.indexOf('PROTOCOL_BREACH')>-1) return 'needs-action';
  if(flags.indexOf('WIN')>-1||flags.indexOf('NEEDS_PM_REVIEW')>-1) return 'ready';
  return 'on-hold';
}

function flagTag(f){
  var m={
    'CLIENT_REPLIED':'<span class="tag t-green">💬 Client Replied</span>',
    'ESCALATION':'<span class="tag t-esc">🚨 Escalation</span>',
    'CLIENT_WAITING':'<span class="tag t-esc">🔴 Client Waiting</span>',
    'SLA_BREACH':'<span class="tag t-esc">⏱ SLA Breach</span>',
    'SEND_NOW':'<span class="tag t-esc">📤 Send Now</span>',
    'OVERDUE':'<span class="tag t-esc">⚠️ Overdue</span>',
    'OVERDUE_TODAY':'<span class="tag t-esc">⚠️ Overdue</span>',
    'URGENT':'<span class="tag t-esc">🔥 Urgent</span>',
    'FOLLOWUP_DUE':'<span class="tag t-amber">🔁 Follow-up Due</span>',
    'DUE_SOON':'<span class="tag t-amber">⏰ Due Soon</span>',
    'DUE_TOMORROW':'<span class="tag t-amber">⏰ Due Tomorrow</span>',
    'BLOCKED':'<span class="tag t-amber">🚧 Blocked</span>',
    'STALE':'<span class="tag t-amber">🕐 Stale</span>',
    'NEEDS_PM_REVIEW':'<span class="tag t-blue">👁 Review</span>',
    'WIN':'<span class="tag t-green">🏆 Win</span>',
    'PROTOCOL_BREACH':'<span class="tag t-purple">🔁 No Comment</span>',
    'INCOMPLETE':'<span class="tag t-amber">⚠️ Incomplete</span>'
  };
  return m[f]||'<span class="tag t-gray">'+x(f)+'</span>';
}

function dueCls(d){
  if(!d||d==='no due'||d==='No due date') return 'date-none';
  if(d.indexOf('OVERDUE')>-1) return 'date-over';
  if(d.indexOf('Today')>-1||d.indexOf('Tomorrow')>-1) return 'date-soon';
  return 'date-ok';
}

// ── reference "today" for calendar bucketing ──
function refDate(){
  if(D.date_iso){var r=new Date(D.date_iso+'T00:00:00');if(!isNaN(r))return r;}
  var n=new Date();n.setHours(0,0,0,0);return n;
}
// returns: overdue | today | tomorrow | soon(day-after / within 48h) | later | none
function dueBucket(t){
  var raw=String(dueVal(t)).trim(), low=raw.toLowerCase();
  if(low.indexOf('overdue')>-1) return 'overdue';
  if(low.indexOf('today')>-1) return 'today';
  if(low.indexOf('tomorrow')>-1) return 'tomorrow';
  var dd=null;
  if(t.due_iso){var p=new Date(t.due_iso+'T00:00:00');if(!isNaN(p))dd=p;}
  if(!dd && raw && low!=='no due'&&low!=='no due date'&&low!=='—'){
    var q=new Date(raw);if(!isNaN(q))dd=new Date(q.getFullYear(),q.getMonth(),q.getDate());
  }
  if(!dd) return 'none';
  var diff=Math.round((dd-refDate())/86400000);
  if(diff<0) return 'overdue';
  if(diff===0) return 'today';
  if(diff===1) return 'tomorrow';
  if(diff===2) return 'soon';
  return 'later';
}

function buildCalendar(allTasks){
  var buckets={overdue:[],today:[],tomorrow:[],soon:[]};
  allTasks.forEach(function(t){
    var b=dueBucket(t);
    if(buckets[b]) buckets[b].push(t);
  });
  Object.keys(buckets).forEach(function(key){
    var col=document.getElementById('cal-'+key);
    var cnt=document.getElementById('calc-'+key);
    var list=buckets[key];
    cnt.textContent=list.length;
    if(!list.length){col.innerHTML='<div class="cal-empty">Nothing due</div>';return;}
    col.innerHTML=list.map(function(t){
      var stale=Number(t.days_stale||0);
      var staleStr=stale>0?'<span class="ci-days">'+stale+'d stale</span>':'';
      var name=(t.name||'').replace(/\|/g,' — ');
      return '<button class="cal-item" onclick="jumpTo(\''+x(t.id||'')+'\')">'+
             '<b>'+x(name)+'</b>'+
             '<span class="ci-meta"><span>'+x(t._brand||'')+'</span><span>'+x(t.status||'')+'</span>'+staleStr+'</span></button>';
    }).join('');
  });
}

function jumpTo(id){
  var el=document.getElementById('task-'+id);
  if(!el) return;
  // make sure it's visible: reset filter to All
  var allBtn=document.querySelector('.fbtn[data-flag="ALL"]');
  if(allBtn) doFilter('ALL',allBtn);
  document.getElementById('srch').value='';
  el.scrollIntoView({behavior:'smooth',block:'center'});
  el.classList.remove('flash');void el.offsetWidth;el.classList.add('flash');
}

function buildHTML(){
  var escC=0,fup=0,win=0,n48=0,tot=0;
  var html='';
  var allTasks=[];

  (D.brands||[]).forEach(function(brand){
    var tasks=brand.tasks||[];
    if(!tasks.length) return;

    var brandKey=x((brand.name||'').toLowerCase());
    html+='<div class="brand-section" data-brand-section="'+brandKey+'">';
    html+='<div class="bh">';
    html+='<div class="bn">'+x(brand.name)+'</div>';
    html+='<div class="bc">'+tasks.length+' task'+(tasks.length!==1?'s':'')+'</div>';
    html+='</div>';

    tasks.forEach(function(t){
      tot++;
      t._brand=brand.name;
      allTasks.push(t);
      var flags=t.flags||[];
      if(flags.indexOf('ESCALATION')>-1) escC++;
      if(flags.indexOf('FOLLOWUP_DUE')>-1) fup++;
      if(flags.indexOf('WIN')>-1) win++;
      var bkt=dueBucket(t);
      if(bkt==='today'||bkt==='tomorrow'||bkt==='soon') n48++;

      var cls=taskClass(flags);
      var flagStr=flags.join(',');
      var brandLower=((brand.name||'')+' '+(t.name||'')).toLowerCase();
      var isEsc=(flags.indexOf('ESCALATION')>-1)?'1':'0';

      var nameParts=(t.name||'').split('|');
      var brandPart=nameParts[0].trim();
      var deliverable=nameParts.length>1?nameParts.slice(1).join('|').trim():'';

      var stale=Number(t.days_stale||0);
      var staleCol=stale>7?'var(--red)':stale>3?'var(--amber)':'var(--gray)';

      html+='<div class="task '+cls+'" id="task-'+x(t.id||'')+'" data-flags="'+x(flagStr)+'" data-brand="'+x(brandLower)+'" data-esc="'+isEsc+'">';

      // ── TASK HEAD ────────────────────────────────────────────────
      html+='<div class="task-head">';

      // Col 1 — Number + Brand / Deliverable
      html+='<div class="tc"><div class="tc-label">Brand / Deliverable</div>';
      html+='<div><span class="task-num">#0</span><span class="task-name">'+x(brandPart)+'</span></div>';
      if(deliverable) html+='<div class="task-del">'+x(deliverable)+'</div>';
      html+='</div>';

      // Col 2 — Status + Flags
      html+='<div class="tc"><div class="tc-label">Status / Flags</div>';
      html+='<span class="tag t-gray" style="margin-bottom:3px;display:inline-block">'+x(t.status||'')+'</span><br>';
      flags.forEach(function(f){html+=flagTag(f);});
      html+='</div>';

      // Col 3 — Days Stale
      html+='<div class="tc"><div class="tc-label">Days in Status</div>';
      html+='<span style="font-family:Syne,sans-serif;font-size:20px;font-weight:700;color:'+staleCol+'">'+stale+'d</span>';
      html+='<div style="font-size:10px;color:#999">same status</div></div>';

      // Col 4 — Client Due Date
      html+='<div class="tc"><div class="tc-label">Client Due Date</div>';
      html+='<div class="'+dueCls(dueVal(t))+'">'+x(dueVal(t)||'No due date')+'</div>';
      if(t.assignee) html+='<span style="font-size:11px;color:var(--gray);display:block;margin-top:3px">'+x(t.assignee)+'</span>';
      html+='</div>';

      // Col 5 — ClickUp link
      html+='<div class="tc"><div class="tc-label">ClickUp</div>';
      if(t.url) html+='<a class="cu-link" href="'+x(t.url)+'" target="_blank">&#8599; '+x(t.id)+'</a>';
      else if(t.id) html+='<a class="cu-link" href="https://app.clickup.com/t/'+x(t.id)+'" target="_blank">&#8599; '+x(t.id)+'</a>';
      else html+='<span class="date-none">—</span>';
      html+='</div>';

      // Col 6 — Report label
      html+='<div class="tc"><div class="tc-label">Report</div>';
      html+='<span style="font-size:11px;color:var(--gray)">'+x(D.report_type||'')+'</span><br>';
      html+='<span style="font-size:10px;color:#bbb">'+x(D.pm_name||'')+'</span>';
      html+='</div>';

      html+='</div>'; // end task-head

      // ── TASK BODY ────────────────────────────────────────────────
      html+='<div class="task-body">';

      // Col 1 — Last Client Comment (full)
      html+='<div class="tb"><div class="tb-label">Last Client Comment</div>';
      html+='<div class="tb-text">'+x(t.last_comment||'No comment available.')+'</div>';
      if(isEsc==='1'||flags.indexOf('OVERDUE_TODAY')>-1){
        var urgentFlag=flags.indexOf('ESCALATION')>-1?'ESCALATION':flags[0];
        html+='<div class="tb-text" style="color:var(--red);font-size:11px;margin-top:4px;font-weight:500">⚠ '+x(urgentFlag)+'</div>';
      }
      html+='</div>';

      // Col 2 — Suggested Reply + 48h Follow-up
      html+='<div class="tb"><div class="tb-label">Suggested reply to client</div>';
      if(t.reply_draft){
        html+='<div class="reply-box">'+x(t.reply_draft)+'</div>';
      } else {
        html+='<div style="color:#bbb;font-size:11px;font-style:italic;padding-top:4px">No client reply needed.</div>';
      }
      if(t.followup_draft || flags.indexOf('FOLLOWUP_DUE')>-1){
        html+='<div class="followup-box">'+x(t.followup_draft||'No reply from client in 48h — send a gentle nudge to keep this moving.')+'</div>';
      }
      html+='</div>';

      // Col 3 — PM Action
      html+='<div class="tb"><div class="tb-label">PM Action</div>';
      if(actionVal(t)){
        html+='<div class="pm-box">'+x(actionVal(t))+'</div>';
      } else {
        html+='<div style="color:#bbb;font-size:11px;font-style:italic">No action defined.</div>';
      }
      html+='</div>';

      // Col 4 — PM Update + Comment
      html+='<div class="tb"><div class="tb-label">PM Update + Comment</div>';
      html+='<textarea style="width:100%;padding:6px 9px;border:1px solid var(--border);border-radius:5px;font-size:12px;background:var(--paper);resize:vertical;min-height:32px;outline:none;display:block;margin-bottom:4px;font-family:\'DM Sans\',sans-serif" placeholder="Internal PM update..."></textarea>';
      html+='<textarea class="comment-input" style="width:100%;padding:6px 9px;border:1px solid var(--border);border-radius:5px;font-size:12px;background:var(--paper);resize:vertical;min-height:32px;outline:none;display:block;font-family:\'DM Sans\',sans-serif" placeholder="Reply for client..."></textarea>';
      html+='<button class="post-btn" onclick="postComment(this,\''+x(t.id||'')+'\')">Copy + open in ClickUp</button>';
      html+='</div>';

      html+='</div>'; // end task-body
      html+='</div>'; // end task
    });

    html+='</div>'; // end brand-section
  });

  // Update stat counters
  document.getElementById('sEsc').textContent=escC;
  document.getElementById('sFup').textContent=fup;
  document.getElementById('s48').textContent=n48;
  document.getElementById('sWin').textContent=win;
  document.getElementById('sTot').textContent=tot;

  document.getElementById('wrap').innerHTML=html||'<div class="empty-state">No flagged tasks found for this report.</div>';

  buildCalendar(allTasks);
  setFilterCounts();
  renumber();
}

// ── live counts on each filter button ──
function setFilterCounts(){
  var tasks=[...document.querySelectorAll('.task')];
  document.querySelectorAll('.fbtn').forEach(function(b){
    var flag=b.dataset.flag;
    var base=b.textContent.replace(/\s*\(\d+\)\s*$/,'');
    var n = flag==='ALL' ? tasks.length
          : tasks.filter(function(t){return (t.dataset.flags||'').split(',').indexOf(flag)>-1;}).length;
    b.textContent=base+' ('+n+')';
  });
}

// ── renumber visible task cards 1..N + update "showing" ──
function renumber(){
  var n=0;
  document.querySelectorAll('.task').forEach(function(t){
    if(t.classList.contains('hidden')) return;
    n++;
    var badge=t.querySelector('.task-num');
    if(badge) badge.textContent='#'+n;
  });
  var s=document.getElementById('showing');
  if(s) s.textContent=n+' task'+(n!==1?'s':'');
}

function doFilter(f,btn){
  document.querySelectorAll('.fbtn').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  document.getElementById('srch').value='';
  document.querySelectorAll('.task').forEach(t=>{
    var flags=(t.dataset.flags||'').split(',');
    var show=f==='ALL'||flags.indexOf(f)>-1;
    t.classList.toggle('hidden',!show);
  });
  document.querySelectorAll('.brand-section').forEach(sec=>{
    var v=[...sec.querySelectorAll('.task')].some(t=>!t.classList.contains('hidden'));
    sec.classList.toggle('hidden',!v);
  });
  renumber();
}

function doSearch(){
  const q=document.getElementById('srch').value.toLowerCase();
  document.querySelectorAll('.task').forEach(t=>{
    const b=(t.dataset.brand||'').toLowerCase();
    t.classList.toggle('hidden',q.length>0&&!b.includes(q));
  });
  document.querySelectorAll('.brand-section').forEach(sec=>{
    const v=[...sec.querySelectorAll('.task')].some(t=>!t.classList.contains('hidden'));
    sec.classList.toggle('hidden',!v);
  });
  document.querySelectorAll('.fbtn').forEach(b=>b.classList.remove('on'));
  document.querySelector('.fbtn[data-flag="ALL"]').classList.add('on');
  renumber();
}

// The report is static (lives in Slack), so it can't safely hold a ClickUp
// token or call the API directly. Instead we compose the message and copy it
// to the clipboard + open the task — the PM pastes it, or the Claude routine
// (which has ClickUp access) posts it on the next run.
function postComment(btn,taskId){
  const tb=btn.closest('.tb');
  const txts=tb.querySelectorAll('textarea');
  const update=txts[0]?.value?.trim()||'';
  const comment=txts[1]?.value?.trim()||'';
  if(!update&&!comment){alert('Enter a comment or update first.');return;}
  const msg=[update?'📋 PM Update: '+update:'',comment?'💬 Client Reply: '+comment:''].filter(Boolean).join('\n\n');
  const done=function(label){
    btn.textContent=label;btn.style.background='#1A6B4A';
    setTimeout(function(){btn.textContent='Copy + open in ClickUp';btn.style.background='';},2500);
    if(taskId) window.open('https://app.clickup.com/t/'+taskId,'_blank');
  };
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(msg).then(function(){done('✓ Copied — paste in ClickUp');},function(){done('Opened ClickUp');});
  } else {
    try{const ta=document.createElement('textarea');ta.value=msg;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);done('✓ Copied — paste in ClickUp');}
    catch(e){done('Opened ClickUp');}
  }
}

buildHTML();
</script>
